server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Add cache control headers so index.html is never cached
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache static assets for performance, but the hashes stop staleness
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Optional: Proxy /api requests if running on same host, 
    # but we use CORS with port 8000 so this isn't strictly needed 
    # unless you want to avoid CORS.
    # location /api/ {
    #     proxy_pass http://backend:8000/;
    # }
}
