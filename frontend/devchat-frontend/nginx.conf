server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Optional: Proxy /api requests if running on same host, 
    # but we use CORS with port 8000 so this isn't strictly needed 
    # unless you want to avoid CORS.
    # location /api/ {
    #     proxy_pass http://backend:8000/;
    # }
}
