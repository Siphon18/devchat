services:
  - type: web
    name: devchat-backend
    runtime: docker
    plan: starter
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: ENABLE_DOCS
        value: "false"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: RATE_LIMIT_DEFAULT_MAX
        value: "240"
      - key: RATE_LIMIT_AUTH_MAX
        value: "15"
      - key: RATE_LIMIT_UPLOAD_MAX
        value: "30"
      - key: RATE_LIMIT_MESSAGE_MAX
        value: "120"
      - key: MAX_USER_STORAGE_BYTES
        value: "262144000"
      - key: MAX_ATTACHMENTS_PER_MESSAGE
        value: "10"
      - key: WELCOME_EMAIL_ENABLED
        value: "false"
      - key: SMTP_HOST
        value: "smtp.resend.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: "resend"
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: "DevChat"
      - key: SMTP_USE_TLS
        value: "true"
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
